[build]
  publish = "."

# Static single-file site — no build step needed.
# index.html at the repo root is served directly.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
